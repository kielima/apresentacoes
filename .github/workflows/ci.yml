name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML workflows
        run: |
          for f in .github/workflows/*.yml; do
            echo "Checking $f"
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "  OK"
          done

      - name: Check for forbidden large files
        run: |
          find . -not -path './.git/*' -size +50M | while read f; do
            echo "ERROR: File too large: $f"
            exit 1
          done
          echo "File size check passed"

      - name: List presentation files
        run: |
          echo "=== Repository contents ==="
          find . -not -path './.git/*' -type f | sort
