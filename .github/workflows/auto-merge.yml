name: Auto Merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    name: Squash merge when CI passes
    runs-on: ubuntu-latest
    # Only proceed when CI succeeded on a PR (not a direct push to main)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find open non-draft PR for this commit
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
            });

            const pr = pulls.find(p => p.head.sha === headSha);

            if (!pr) {
              core.notice(`No open PR found for ${headBranch}@${headSha} — skipping.`);
              return;
            }

            if (pr.draft) {
              core.notice(`PR #${pr.number} is still a draft — skipping.`);
              return;
            }

            core.setOutput('pr-number', String(pr.number));
            core.info(`Will merge PR #${pr.number}: ${pr.title}`);

      - name: Squash merge PR
        if: steps.find-pr.outputs.pr-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.find-pr.outputs.pr-number }}" \
            --squash \
            --delete-branch \
            --repo "${{ github.repository }}"
