  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      color: #222;
      overflow: hidden;
    }
    #LinkingInvestmentsSankey {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #LinkingInvestmentsSankey > svg {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    /* Sankey hover interactivity */
    .sankey-tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(15, 20, 16, 0.95);
      color: #f6f4ef;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 20px;
      line-height: 1.4;
      padding: 12px 16px;
      border-radius: 5px;
      max-width: 380px;
      z-index: 9999;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 90ms ease;
      box-shadow: 0 6px 22px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .sankey-tooltip.show { opacity: 1; }
    /* Allow wrapping when there's value content */
    .sankey-tooltip:has(.ttl-value-sub) { white-space: normal; }
    .sankey-tooltip .ttl-name { font-weight: 600; letter-spacing: 0.02em; font-size: 20px; }
    .sankey-tooltip .ttl-arrow { opacity: 0.55; padding: 0 6px; }
    .sankey-tooltip .ttl-meta { display: block; margin-top: 6px; font-size: 20px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
    .sankey-tooltip .ttl-value-num { font-family: 'Newsreader', Georgia, serif; font-size: 24px; line-height: 1.1; margin-top: 8px; color: #ffd27a; letter-spacing: 0.02em; }
    .sankey-tooltip .ttl-value-sub { font-size: 20px; line-height: 1.5; margin-top: 6px; opacity: 0.9; white-space: normal; }
    .sankey-tooltip .ttl-value-sub strong { color: #ffd27a; font-weight: 600; }

    /* Visual states on the SVG */
    #LinkingInvestmentsSankey svg g.link path { cursor: pointer; transition: stroke-opacity 120ms ease; }
    #LinkingInvestmentsSankey svg rect { cursor: pointer; transition: opacity 120ms ease, filter 120ms ease; }
    /* Text labels are decorative — let mouse pass through to the rect/path beneath */
    #LinkingInvestmentsSankey svg text { pointer-events: none; user-select: none; }
    /* Dim everything when an element is hovered */
    #LinkingInvestmentsSankey svg.is-hovering g.link path:not(.is-hover) { stroke-opacity: 0.04 !important; }
    #LinkingInvestmentsSankey svg.is-hovering rect:not(.is-hover):not(.is-related) { opacity: 0.18; }
    #LinkingInvestmentsSankey svg.is-hovering text:not(.is-related) { opacity: 0.28; }
    /* Hovered link */
    #LinkingInvestmentsSankey svg g.link path.is-hover { stroke-opacity: 0.85 !important; }
    /* Hovered or related node */
    #LinkingInvestmentsSankey svg rect.is-hover { filter: brightness(1.15) drop-shadow(0 0 4px rgba(0,0,0,0.25)); }

    /* Bump up the original SVG text sizes for readability */
    #LinkingInvestmentsSankey svg text[font-size="16"] { font-size: 22px; }
    #LinkingInvestmentsSankey svg text[font-size="11"] { font-size: 20px; }
  </style>

<script>
(function () {
  // Wait for the SVG to be in the DOM (it's static, but be safe with deferred fonts)
  function init() {
    const svg = document.querySelector('#LinkingInvestmentsSankey svg');
    if (!svg) return;

    // Counter-scale text to undo the horizontal stretch from preserveAspectRatio="none"
    const VB_W = 1068, VB_H = 700;
    function adjustText() {
      const rect = svg.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const sx = rect.width / VB_W;
      const sy = rect.height / VB_H;
      const xRatio = sy / sx;
      svg.querySelectorAll('text').forEach((t) => {
        const x = parseFloat(t.getAttribute('x')) || 0;
        const y = parseFloat(t.getAttribute('y')) || 0;
        // Compress text horizontally by xRatio around its anchor point
        t.setAttribute('transform', `translate(${x * (1 - xRatio)}, 0) scale(${xRatio}, 1)`);
      });
    }
    adjustText();
    window.addEventListener('resize', adjustText);
    // Re-run after fonts load (their metrics can shift)
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(adjustText);
    }

    // Build tooltip
    const tooltip = document.createElement('div');
    tooltip.className = 'sankey-tooltip';
    document.body.appendChild(tooltip);

    // Parse rects + texts into structured info
    const rects = [...svg.querySelectorAll('rect')];
    const texts = [...svg.querySelectorAll('text')];

    const rectInfo = rects.map((r) => {
      const x = parseFloat(r.getAttribute('x')) || 0;
      const y = parseFloat(r.getAttribute('y')) || 0;
      const w = parseFloat(r.getAttribute('width')) || 0;
      const h = parseFloat(r.getAttribute('height')) || 0;
      // Find the text whose center is closest vertically and whose x sits in this column
      let label = '';
      let bestDist = Infinity;
      let labelEl = null;
      for (const t of texts) {
        const tx = parseFloat(t.getAttribute('x')) || 0;
        const ty = parseFloat(t.getAttribute('y')) || 0;
        if (tx < x - 5 || tx > x + w + 30) continue;
        if (ty < y - 4 || ty > y + h + 6) continue;
        const dist = Math.abs(ty - (y + h / 2));
        if (dist < bestDist) {
          bestDist = dist;
          label = t.textContent.trim();
          labelEl = t;
        }
      }
      let col = 'agency';
      if (x < 100) col = 'partner';
      else if (x > 800) col = 'ods';
      return { rect: r, x, y, w, h, right: x + w, bottom: y + h, label, labelEl, col };
    });

    // Parse paths and find source/target rects
    const linkPaths = [...svg.querySelectorAll('g.link path')];
    const pathInfo = linkPaths.map((p) => {
      const d = p.getAttribute('d') || '';
      const coords = [...d.matchAll(/(-?[\d.]+),(-?[\d.]+)/g)].map((m) => [parseFloat(m[1]), parseFloat(m[2])]);
      if (coords.length < 2) return { path: p, src: null, tgt: null, value: 0 };
      const [sx, sy] = coords[0];
      const [ex, ey] = coords[coords.length - 1];
      const sw = parseFloat(p.getAttribute('stroke-width')) || 0;
      let src = null;
      let tgt = null;
      for (const ri of rectInfo) {
        if (!src && Math.abs(ri.right - sx) < 2 && sy >= ri.y - 1.5 && sy <= ri.bottom + 1.5) src = ri;
        if (!tgt && Math.abs(ri.x - ex) < 2 && ey >= ri.y - 1.5 && ey <= ri.bottom + 1.5) tgt = ri;
        if (src && tgt) break;
      }
      return { path: p, src, tgt, value: sw };
    });

    // Helpers
    function clearMarks() {
      svg.classList.remove('is-hovering');
      svg.querySelectorAll('.is-hover, .is-related').forEach((el) => el.classList.remove('is-hover', 'is-related'));
    }
    function positionTooltip(e) {
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
    }
    function showTooltip(html, e) {
      tooltip.innerHTML = html;
      positionTooltip(e);
      tooltip.classList.add('show');
    }
    function hideTooltip() {
      tooltip.classList.remove('show');
    }
    const COL_LABEL = { partner: 'Parceiro financiador', agency: 'Agência ONU', ods: 'Objetivo de Desenvolvimento Sustentável' };

    // Specific known financial values from the ONU Brasil dashboard
    function nodeValue(label) {
      if (label === 'Brazil') {
        return '<div class="ttl-value-num">US$ 399,5 mi <span style="opacity:.75; font-size:20px;">(0,017% PIB)</span></div>' +
               '<div class="ttl-value-sub">contribuição total do Brasil</div>' +
               '<div class="ttl-value-num" style="margin-top: 10px;">R$ 12,7 tri</div>' +
               '<div class="ttl-value-sub">PIB do Brasil (2025) · fonte: <strong>IBGE</strong></div>';
      }
      if (/^11\./.test(label || '')) {
        return '<div class="ttl-value-num">US$ 96,9 mi <span style="opacity:.75; font-size:20px;">(0,0042% PIB)</span></div>' +
               '<div class="ttl-value-sub">investimentos totais recebidos<br>(soma de todos os parceiros)</div>' +
               '<div class="ttl-value-sub" style="margin-top:6px; opacity:.7;">% calculada a R$ 5,50/US$ sobre PIB R$ 12,7 tri (IBGE 2025)</div>';
      }
      return null;
    }
    function linkValue(srcLabel, tgtLabel) {
      // Brazil → any agency that flows to SDG 11 is part of the 96,9 mi; we don't break it down per agency
      return null;
    }

    // Node hover
    rectInfo.forEach((ri) => {
      ri.rect.addEventListener('mouseenter', (e) => {
        clearMarks();
        svg.classList.add('is-hovering');
        ri.rect.classList.add('is-hover');
        if (ri.labelEl) ri.labelEl.classList.add('is-related');
        // Highlight all paths touching this node and the rects/texts on the other end
        pathInfo.forEach((pi) => {
          if (pi.src === ri || pi.tgt === ri) {
            pi.path.classList.add('is-hover');
            if (pi.src && pi.src !== ri) {
              pi.src.rect.classList.add('is-related');
              if (pi.src.labelEl) pi.src.labelEl.classList.add('is-related');
            }
            if (pi.tgt && pi.tgt !== ri) {
              pi.tgt.rect.classList.add('is-related');
              if (pi.tgt.labelEl) pi.tgt.labelEl.classList.add('is-related');
            }
          }
        });
        const v = nodeValue(ri.label);
        showTooltip(
          '<div class="ttl-name">' + (ri.label || '—') + '</div>' +
          (v ? '<div class="ttl-value">' + v + '</div>' : '') +
          '<span class="ttl-meta">' + (COL_LABEL[ri.col] || '') + '</span>',
          e
        );
      });
      ri.rect.addEventListener('mousemove', positionTooltip);
      ri.rect.addEventListener('mouseleave', () => {
        clearMarks();
        hideTooltip();
      });
    });

    // Link hover
    pathInfo.forEach((pi) => {
      pi.path.addEventListener('mouseenter', (e) => {
        clearMarks();
        svg.classList.add('is-hovering');
        pi.path.classList.add('is-hover');
        if (pi.src) {
          pi.src.rect.classList.add('is-related');
          if (pi.src.labelEl) pi.src.labelEl.classList.add('is-related');
        }
        if (pi.tgt) {
          pi.tgt.rect.classList.add('is-related');
          if (pi.tgt.labelEl) pi.tgt.labelEl.classList.add('is-related');
        }
        const sLabel = pi.src ? pi.src.label : '?';
        const tLabel = pi.tgt ? pi.tgt.label : '?';
        showTooltip(
          '<div><span class="ttl-name">' + sLabel + '</span><span class="ttl-arrow">→</span><span class="ttl-name">' + tLabel + '</span></div>' +
          '<span class="ttl-meta">Fluxo (espessura ≈ contribuição)</span>',
          e
        );
      });
      pi.path.addEventListener('mousemove', positionTooltip);
      pi.path.addEventListener('mouseleave', () => {
        clearMarks();
        hideTooltip();
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
